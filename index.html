<!DOCTYPE html>
<html>
<head>
    <title>My Voice Assistant</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        color: white;
        background-color: #007bff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background-color: #0056b3;
    }
    p {
        font-size: 18px;
        margin-top: 20px;
    }
    </style>
<body>

<h2>🎤 My Website Voice Assistant</h2>

<button onclick="startListening()">Speak</button>
<p id="userText"></p>
<p id="aiText"></p>
<button onclick="window.location.href='https://www.google.com'">Go to Google</button>
<button onclick="deleteUserText()">Delete</button>

<script>
async function startListening() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    recognition.onresult = async function(event) {
        let userMessage = event.results[0][0].transcript;
        document.getElementById("userText").innerText = "You: " + userMessage;

        // Send to backend
        let response = await fetch("http://localhost:3000/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: userMessage })
        });

        let data = await response.json();
        let aiReply = data.reply;

            document.getElementById("aiText").innerText = "Assistant: " + aiReply;
        speak(aiReply);
    };

    recognition.start();
}

function speak(text) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}

// clear both displayed texts and stop any ongoing speech synthesis
function deleteUserText() {
    document.getElementById("userText").innerText = "";
    document.getElementById("aiText").innerText = "";
    if (window.speechSynthesis && window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
    }
}
</script>

</body>
</html>
